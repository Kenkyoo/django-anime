databases:
  - name: projectdb
    plan: free
    databaseName: project
    user: franco

services:
  - type: web
    plan: free
    name: project
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn cd project project.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: projectdb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
